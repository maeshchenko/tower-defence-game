<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ba83a"/>
      <stop offset="1" stop-color="#3f7a28"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c97f0"/>
      <stop offset="1" stop-color="#3f6fc4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="#000" opacity="0.0"/>
  <!-- ground shadow -->
  <ellipse cx="256" cy="404" rx="150" ry="34" fill="#000" opacity="0.18"/>
  <!-- tower body (stone) -->
