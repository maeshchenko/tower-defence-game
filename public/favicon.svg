  <path d="M256 196 h88 v176 a40 40 0 0 1 -40 40 h-48 z" fill="#9aa4ad"/>
  <!-- crenellations -->
  <g fill="#c2ccd4">
    <rect x="160" y="172" width="34" height="40" rx="6"/>
    <rect x="222" y="172" width="34" height="40" rx="6"/>
    <rect x="284" y="172" width="34" height="40" rx="6"/>
    <rect x="346" y="172" width="6" height="40"/>
  </g>
  <g fill="#9aa4ad">
    <rect x="256" y="172" width="34" height="40" rx="6"/>
    <rect x="318" y="172" width="34" height="40" rx="6"/>
  </g>
  <!-- roof / turret -->
  <polygon points="256,60 336,168 176,168" fill="url(#roof)"/>
  <polygon points="256,60 336,168 256,168" fill="#3f6fc4"/>
  <circle cx="256" cy="56" r="16" fill="#ffd54a"/>
  <!-- door -->
